services:
  db:
    image: postgres:17
    container_name: wonkao-talk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wonkao_talk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql

  redis:
    image: redis:7.4
    container_name: wonkao-talk-redis
    ports:
      - "6739:6379"

  #카프카 설정은 나중에 수정해주세요!
  kafka:
    image: apache/kafka:4.2.0 # 공식 Apache Kafka 이미지 사용
    container_name: wonkao-talk-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft 모드 핵심 설정
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'

      # 리스너 및 통신 설정
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'

      # 클러스터 ID (KRaft 필수)
      KAFKA_CLUSTER_ID: 'wonkao-talk-cluster-id'

      # 기타 설정
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./kafka/data:/var/lib/kafka/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: wonkao-talk-es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false