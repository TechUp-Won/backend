services:
  db:
    image: postgres:17
    container_name: wonkao-talk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wonkao_talk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql

  redis:
    image: redis:7.4
    container_name: wonkao-talk-redis
    ports:
      - "6739:6379"

  #카프카 설정은 나중에 수정해주세요!
  kafka:
    image: bitnami/kafka:4.2
    container_name: wonkao-talk-kafka
    ports:
      - "9092:9092"
    environment:
      # 4.x 핵심: KRaft 설정
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # 리스너 설정
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # 클러스터 ID (생략 시 자동 생성되나 명시 권장)
      - KAFKA_KRAFT_CLUSTER_ID=wonkao-talk-cluster-id
    volumes:
      - ./kafka/data:/bitnami/kafka

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: wonkao-talk-es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false